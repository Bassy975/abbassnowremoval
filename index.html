<!DOCTYPE html>
<html>
<head>
<title>Abbas Snow AI</title>
<script src="https://js.stripe.com/v3/"></script>

<style>
body {
  margin:0;
  padding:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(to bottom,#0f172a,#020617);
  color:white;
  text-align:center;
  overflow-x:hidden;
}

/* ❄ Snow */
.snowflake {
  position:fixed;
  top:-10px;
  color:white;
  font-size:12px;
  animation:fall linear forwards;
}

@keyframes fall {
  to { transform:translateY(110vh); }
}

/* Top Bar */
.topbar {
  padding:10px;
  background:#111827;
  font-size:14px;
  letter-spacing:1px;
}

/* Glass Card */
.container {
  max-width:700px;
  margin:40px auto;
  padding:30px;
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  backdrop-filter:blur(15px);
  box-shadow:0 0 40px rgba(34,197,94,0.2);
}

h1 {
  margin-top:0;
}

.subtitle {
  color:#94a3b8;
  margin-bottom:20px;
  font-size:14px;
}

#chat {
  height:300px;
  overflow:auto;
  border:1px solid rgba(255,255,255,0.1);
  padding:15px;
  border-radius:15px;
  background:rgba(0,0,0,0.3);
  text-align:left;
}

input, button {
  padding:12px;
  margin:6px;
  border-radius:10px;
  border:none;
}

input {
  width:60%;
}

button {
  background:#22c55e;
  color:white;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 0 15px rgba(34,197,94,0.6);
}

button:hover {
  background:#16a34a;
  box-shadow:0 0 25px rgba(34,197,94,1);
}

.section {
  margin-top:40px;
}

.typing {
  font-style:italic;
  color:#22c55e;
}
</style>
</head>
<body>

<div class="topbar">
📞 Call Now: 267-310-6475
</div>

<div class="container">
<h1>❄ Abbas Snow Removal AI</h1>
<p class="subtitle">(Only for questions about my business)</p>

<div id="chat"></div>

<input id="msg" placeholder="Ask about prices, weather, booking...">
<button onclick="send()">Send</button>

<div class="section">
<h2>📅 Book Service</h2>
<input id="name" placeholder="Your Name">
<input type="date" id="date">
<button onclick="book()">Book</button>
</div>

<div class="section">
<h2>💳 Pay</h2>
<button onclick="pay(2000)">Small - $20</button>
<button onclick="pay(3500)">Medium - $35</button>
<button onclick="pay(5000)">Large - $50</button>
</div>
</div>

<script>
/* ❄ Snowfall */
function createSnow(){
  const snow = document.createElement("div");
  snow.className="snowflake";
  snow.innerHTML="❄";
  snow.style.left=Math.random()*100+"vw";
  snow.style.animationDuration=(3+Math.random()*5)+"s";
  document.body.appendChild(snow);
  setTimeout(()=>snow.remove(),8000);
}
setInterval(createSnow,200);

/* Chat */
const backend = "https://your-backend.onrender.com";

function add(who,text){
  const chat=document.getElementById("chat");
  chat.innerHTML += "<p><b>"+who+":</b> "+text+"</p>";
  chat.scrollTop = chat.scrollHeight;
}

function typingEffect(){
  const chat=document.getElementById("chat");
  chat.innerHTML += "<p class='typing'>AI is typing...</p>";
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping(){
  const typing=document.querySelector(".typing");
  if(typing) typing.remove();
}

async function send(){
  const msg=document.getElementById("msg").value;
  if(!msg) return;

  add("You",msg);
  document.getElementById("msg").value="";

  typingEffect();

  try{
    const res=await fetch(`${backend}/chat`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:msg})
    });

    const data=await res.json();
    removeTyping();
    add("AI",data.reply);
  }catch{
    removeTyping();
    add("AI","AI is currently offline. Please call 267-310-6475.");
  }
}

/* Booking */
function book(){
  const name=document.getElementById("name").value;
  const date=document.getElementById("date").value;

  if(!name||!date){
    alert("Please enter name and date.");
    return;
  }

  alert("Booking request sent!\n\nWe will contact you soon.");
}

/* Stripe Payment */
async function pay(amount){
  const stripe=Stripe("pk_test_yourkey"); // replace
  const res=await fetch(`${backend}/create-checkout-session`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({amount})
  });
  const data=await res.json();
  stripe.redirectToCheckout({sessionId:data.id});
}
</script>

</body>
</html>
