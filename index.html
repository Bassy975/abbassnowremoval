<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abbas's Snow Removal | Philadelphia</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b1f33;
  color: white;
  text-align: center;
  overflow-x: hidden;
}

h1 { font-size: 42px; margin-bottom: 10px; }
h2 { margin-top: 60px; }

.section {
  padding: 80px 20px;
}

.btn {
  display: inline-block;
  padding: 15px 35px;
  margin: 10px;
  border-radius: 40px;
  font-weight: bold;
  text-decoration: none;
  transition: 0.3s;
}

.call {
  background: #1e73be;
  color: white;
}

.call:hover {
  background: #155a94;
  transform: scale(1.05);
}

.donate {
  background: #00c244;
  color: black;
  animation: glow 1.8s infinite alternate;
}

.donate:hover {
  transform: scale(1.08);
}

@keyframes glow {
  from { box-shadow: 0 0 10px #00ff66; }
  to { box-shadow: 0 0 25px #00ff99; }
}

/* Snow */
.snow {
  position: fixed;
  top: -10px;
  color: white;
  pointer-events: none;
  animation: fall linear forwards;
}

@keyframes fall {
  to { transform: translateY(110vh); }
}
</style>
</head>

<body>

<div class="section">
  <h1>Abbas's Snow Removal</h1>
  <p>Professional Snow Removal in Philadelphia</p>

  <a class="btn call" href="tel:2673106475">
    Call Now (267) 310-6475
  </a>
</div>

<div class="section">
  <h2>Support With Cash App</h2>
  <p>Tip or support our work:</p>

  <a class="btn donate" href="https://cash.app/$Abbas038/5" target="_blank">$5</a>
  <a class="btn donate" href="https://cash.app/$Abbas038/10" target="_blank">$10</a>
  <a class="btn donate" href="https://cash.app/$Abbas038/20" target="_blank">$20</a>
  <br>
  <a class="btn donate" href="https://cash.app/$Abbas038" target="_blank">
    Custom Amount
  </a>
</div>

<script>
function snow() {
  const s = document.createElement("div");
  s.innerHTML = "❄";
  s.className = "snow";
  s.style.left = Math.random() * window.innerWidth + "px";
  s.style.fontSize = (Math.random() * 10 + 10) + "px";
  s.style.animationDuration = (Math.random() * 3 + 2) + "s";
  document.body.appendChild(s);

  setTimeout(() => { s.remove(); }, 5000);
}

setInterval(snow, 150);
</script>

</body>
</html>
